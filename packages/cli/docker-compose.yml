version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dockview
      POSTGRES_PASSWORD: dockview
      POSTGRES_DB: dockview
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dockview -d dockview"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./demo-api:/app
    command: sh -lc "npm install && node server.js"
    environment:
      PORT: "3000"
      DATABASE_URL: "postgres://dockview:dockview@postgres:5432/dockview"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./demo-api:/app
    command: sh -lc "npm install && node worker.js"
    environment:
      DATABASE_URL: "postgres://dockview:dockview@postgres:5432/dockview"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
